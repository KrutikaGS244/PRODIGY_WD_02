<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stopwatch App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,black);
            color: white;
            text-align: center;
            margin-top: 100px;
        }

        h1 {
            margin-bottom: 20px;
        }

        #display {
            font-size: 40px;
            margin: 20px 0;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .start { background: green; color: white; }
        .pause { background: orange; color: white; }
        .reset { background: red; color: white; }
        .lap { background: blue; color: white; }

        #laps {
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h1>Stopwatch App</h1>

    <div id="display">00:00:00</div>

    <button class="start" onclick="start()">Start</button>
    <button class="pause" onclick="pause()">Pause</button>
    <button class="reset" onclick="reset()">Reset</button>
    <button class="lap" onclick="lap()">Lap</button>

    <div id="laps"></div>

    <script>
        let seconds = 0;
        let minutes = 0;
        let hours = 0;
        let timer = null;

        function updateDisplay() {
            let h = hours < 10 ? "0" + hours : hours;
            let m = minutes < 10 ? "0" + minutes : minutes;
            let s = seconds < 10 ? "0" + seconds : seconds;

            document.getElementById("display").innerText = `${h}:${m}:${s}`;
        }

        function start() {
            if (timer !== null) return;

            timer = setInterval(() => {
                seconds++;

                if (seconds === 60) {
                    seconds = 0;
                    minutes++;
                }

                if (minutes === 60) {
                    minutes = 0;
                    hours++;
                }

                updateDisplay();
            }, 1000);
        }

        function pause() {
            clearInterval(timer);
            timer = null;
        }

        function reset() {
            clearInterval(timer);
            timer = null;
            seconds = 0;
            minutes = 0;
            hours = 0;
            updateDisplay();
            document.getElementById("laps").innerHTML = "";
        }

        function lap() {
            let lapTime = document.getElementById("display").innerText;
            let lapItem = document.createElement("p");
            lapItem.innerText = "Lap: " + lapTime;
            document.getElementById("laps").appendChild(lapItem);
        }
    </script>

</body>
</html>
